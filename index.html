<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robs Delivery Express 🚀</title>
    
    <script>
        (function() {
            const _0xkey = "QUl6YVN5QWRqSnBSSFRxVmRJUXlfZ09QOHhFNHY0YWt1ZUZPUk5z";
            const script = document.createElement('script');
            script.src = `https://maps.googleapis.com/maps/api/js?key=${atob(_0xkey)}&libraries=places`;
            script.async = true; document.head.appendChild(script);
        })();
    </script>

    <style>
        :root { --admin: #f39c12; --rest: #27ae60; --client: #3498db; --driver: #e67e22; --danger: #e74c3c; --dark: #1a4a40; --accent: #ffffff; }
        
        /* FONDO SOLICITADO #2E7868 */
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #2E7868; padding-bottom: 100px; color: white; }
        .container { max-width: 850px; margin: auto; padding: 12px; }

        /* PUBLICIDAD Y RADIO */
        .ads-box { background: #000; border-radius: 16px; overflow: hidden; margin-bottom: 10px; }
        #videoPlayer { width: 100%; height: 180px; object-fit: cover; display: block; }
        
        .radio-box { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; margin-bottom: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.2); }
        .radio-box h4 { margin: 0 0 10px 0; font-size: 14px; letter-spacing: 1px; color: #fff; }
        audio { width: 100%; height: 35px; filter: invert(100%); }

        /* NAVEGACIÓN */
        .nav-bar { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; margin-bottom: 20px; }
        .nav-btn { flex: none; padding: 12px 20px; border: none; border-radius: 25px; color: white; font-weight: bold; cursor: pointer; font-size: 13px; white-space: nowrap; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }

        /* SECCIONES */
        .section { display: none; background: rgba(255,255,255,0.1); padding: 22px; border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .active { display: block; }

        /* COMPONENTES */
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; color: #333; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; }
        .btn-full { width: 100%; padding: 15px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 14px; }
        
        .cart-float { position: fixed; bottom: 0; left: 0; right: 0; background: var(--dark); color: white; padding: 20px; display: none; justify-content: space-between; align-items: center; border-radius: 25px 25px 0 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="ads-box">
        <video id="videoPlayer" autoplay muted loop playsinline><source src="" id="vSource"></video>
    </div>

    <div class="radio-box">
        <h4>📻 RADIO 503 EL SALVADOR 503</h4>
        <audio controls>
            <source src="https://stream.zeno.fm/tu_stream_aqui" type="audio/mpeg">
            Tu navegador no soporta el reproductor de radio.
        </audio>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <div><small>Hola,</small><br><b id="uEmail">Invitado</b></div>
        <button id="btnExit" onclick="logout()" style="display:none; background:var(--danger); border:none; color:white; padding:6px 12px; border-radius:8px; cursor:pointer; font-weight:bold;">Salir</button>
    </div>

    <div class="nav-bar">
        <button class="nav-btn" style="background:var(--client)" onclick="tryClientTab()">🍴 Hacer Pedido</button>
        <button class="nav-btn" style="background:var(--rest)" onclick="openTab('r-tab')">🏠 Soy Dueño</button>
        <button class="nav-btn" style="background:#8e44ad" onclick="openTab('k-tab')">👨‍🍳 Cocina</button>
        <button class="nav-btn" style="background:var(--driver)" onclick="openTab('d-tab')">🏍️ Drivers</button>
        <button id="admNav" class="nav-btn" style="background:var(--admin); display:none;" onclick="openTab('a-tab')">🛡️ Admin</button>
    </div>

    <div id="c-tab" class="section">
        <button class="btn-full" style="background:var(--dark)" onclick="loadStores()">📍 ENCONTRAR SUCURSALES</button>
        <div id="storeList" style="margin-top:20px;"></div>
        </div>

    <div id="r-tab" class="section active">
        <div id="dueno-login">
            <h3>🔑 Acceso Requerido</h3>
            <p>Para realizar pedidos o gestionar locales, por favor inicia sesión.</p>
            <button class="btn-full" style="background:var(--client)" onclick="googleIn()">Entrar con Google</button>
        </div>
        <div id="dueno-panel" style="display:none">
            </div>
    </div>

    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, query, where, getDocs, updateDoc, orderBy } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCo8_Qzp_Up72063TbNqDPWFTPqZxvHRcE",
        authDomain: "robs-delivery-express-9fd38.firebaseapp.com",
        projectId: "robs-delivery-express-9fd38",
        storageBucket: "robs-delivery-express-9fd38.firebasestorage.app",
        messagingSenderId: "932715527848",
        appId: "1:932715527848:web:ecdfa23d7cc9c0ca6f4c9d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const prov = new GoogleAuthProvider();

    let curUser = null;

    // --- PROTECCIÓN DE PESTAÑA CLIENTE ---
    window.tryClientTab = () => {
        if (!curUser) {
            alert("⚠️ Por favor, inicia sesión para poder realizar pedidos.");
            openTab('r-tab'); // Envía al usuario a la pestaña de login
        } else {
            openTab('c-tab');
        }
    };

    window.openTab = (id) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };

    // --- CARGA DE PUBLICIDAD ---
    onSnapshot(doc(db, "configuracion", "publicidad"), d => {
        if(d.exists()){
            const data = d.data();
            if(data.videoUrl) { document.getElementById('vSource').src = data.videoUrl; document.getElementById('videoPlayer').load(); }
        }
    });

    // --- MONITOREO DE SESIÓN ---
    onAuthStateChanged(auth, u => {
        curUser = u;
        if(u){
            document.getElementById('uEmail').innerText = u.email;
            document.getElementById('btnExit').style.display = 'block';
            document.getElementById('dueno-login').style.display = 'none';
            document.getElementById('dueno-panel').style.display = 'block';
            if(u.email === "robs2002019@gmail.com") document.getElementById('admNav').style.display='block';
        } else {
            document.getElementById('uEmail').innerText = "Invitado";
            document.getElementById('btnExit').style.display = 'none';
            document.getElementById('dueno-login').style.display = 'block';
            document.getElementById('dueno-panel').style.display = 'none';
            openTab('r-tab'); // Mostrar login por defecto
        }
    });

    window.googleIn = () => signInWithPopup(auth, prov);
    window.logout = () => signOut(auth).then(()=>location.reload());

</script>
</body>
</html>
