<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robs Delivery Express 🚀</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background-color: #f0f2f5; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* Estilos Publicidad */
        .ads-section { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .video-ad-container { grid-column: span 2; background: #000; border-radius: 8px; overflow: hidden; height: 300px; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .banner-ad { width: 100%; height: 120px; background: #ddd; border-radius: 8px; object-fit: cover; border: 1px solid #ccc; }
        
        /* Formulario y Botones */
        h2 { border-left: 5px solid #27ae60; padding-left: 10px; color: #27ae60; }
        input, textarea { display: block; width: 100%; box-sizing: border-box; margin-bottom: 10px; padding: 10px; border: 1px solid #ccc; border-radius: 6px; }
        button { padding: 12px; cursor: pointer; background: #27ae60; color: white; border: none; border-radius: 6px; font-weight: bold; width: 100%; margin-bottom: 10px; }
        .btn-delete { background: #e74c3c; width: auto; padding: 5px 10px; font-size: 12px; }
        .admin-panel { background: #fff3cd; padding: 15px; border-radius: 8px; border: 1px solid #ffeeba; margin-top: 40px; }
        .loading { display: none; color: #f39c12; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>Robs Delivery Express 🚀</h1>

    <div class="ads-section">
        <div class="video-ad-container" id="videoContainer">
            <video id="reproductorAds" controls autoplay muted loop>
                <source src="" id="videoSrc" type="video/mp4">
                Tu navegador no soporta video.
            </video>
        </div>
        <img id="banner1" class="banner-ad" src="https://via.placeholder.com/400x120?text=Publicidad+1" alt="Banner 1">
        <img id="banner2" class="banner-ad" src="https://via.placeholder.com/400x120?text=Publicidad+2" alt="Banner 2">
    </div>

    <button id="btnLogin" style="background: #4285F4;">Login con Google</button>
    <p id="userStatus" style="text-align:center;">No conectado</p>

    <hr>

    <div class="admin-panel" id="panelAdminPublicidad">
        <h2>📺 Panel de Publicidad (Solo Admin)</h2>
        <p>Sube los archivos para cambiar los anuncios de la plataforma.</p>
        
        <label><b>Video Publicitario (MP4):</b></label>
        <input type="file" id="fileVideo" accept="video/mp4">
        <button onclick="subirPublicidad('video', 'fileVideo')">Actualizar Video</button>

        <label><b>Banner 1 (Imagen):</b></label>
        <input type="file" id="fileBanner1" accept="image/*">
        <button onclick="subirPublicidad('banner1', 'fileBanner1')">Actualizar Banner 1</button>

        <label><b>Banner 2 (Imagen):</b></label>
        <input type="file" id="fileBanner2" accept="image/*">
        <button onclick="subirPublicidad('banner2', 'fileBanner2')">Actualizar Banner 2</button>
        
        <div id="loadingPub" class="loading">Procesando archivo... por favor espera.</div>
    </div>

    <hr>

    <h2>Registrar Restaurante</h2>
    <input id="restNombre" placeholder="Nombre del restaurante">
    <button id="btnGuardarRest">Guardar Restaurante</button>

    <h2>Mis Restaurantes</h2>
    <div id="listaRest"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCo8_Qzp_Up72063TbNqDPWFTPqZxvHRcE",
        authDomain: "robs-delivery-express-9fd38.firebaseapp.com",
        projectId: "robs-delivery-express-9fd38",
        storageBucket: "robs-delivery-express-9fd38.firebasestorage.app",
        messagingSenderId: "932715527848",
        appId: "1:932715527848:web:ecdfa23d7cc9c0ca6f4c9d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const provider = new GoogleAuthProvider();

    // --- LOGIN ---
    document.getElementById('btnLogin').onclick = () => signInWithPopup(auth, provider);

    // --- CARGAR PUBLICIDAD EN TIEMPO REAL ---
    onSnapshot(collection(db, "publicidad"), (snapshot) => {
        snapshot.forEach((doc) => {
            const data = doc.data();
            if (doc.id === "video") {
                document.getElementById('videoSrc').src = data.url;
                document.getElementById('reproductorAds').load();
            }
            if (doc.id === "banner1") document.getElementById('banner1').src = data.url;
            if (doc.id === "banner2") document.getElementById('banner2').src = data.url;
        });
    });

    // --- SUBIR PUBLICIDAD (Función Global) ---
    window.subirPublicidad = async (tipo, inputId) => {
        const file = document.getElementById(inputId).files[0];
        const loading = document.getElementById('loadingPub');
        if (!file) return alert("Selecciona un archivo primero");

        try {
            loading.style.display = "block";
            // 1. Subir a Storage (Sobrescribe el anterior para ahorrar espacio)
            const storageRef = ref(storage, `publicidad/${tipo}`);
            await uploadBytes(storageRef, file);
            const url = await getDownloadURL(storageRef);

            // 2. Guardar URL en Firestore
            await setDoc(doc(db, "publicidad", tipo), { url: url, fecha: new Date() });
            
            alert(`¡${tipo} actualizado con éxito!`);
        } catch (e) {
            console.error(e);
            alert("Error al subir");
        } finally {
            loading.style.display = "none";
        }
    };

    // (Lógica de restaurantes omitida por brevedad, se mantiene igual a la anterior)
</script>

</body>
</html>
